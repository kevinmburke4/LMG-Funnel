*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f5f7;color:#1a1a1a;font-size:14px;min-height:100vh}

.view-header{margin-bottom:20px;padding:16px 20px;border:1px solid #e5e7eb;border-radius:12px;background:#fff}

.b-blue{background:#dbeafe;color:#1e40af}

.b-green{background:#d1fae5;color:#065f46}

.funnel-stage-row{display:flex;justify-content:center;margin-bottom:5px}

.bar-desc:hover:not(:focus){background:rgba(255,255,255,.12)}
.bar-toggle{font-size:12px;color:rgba(255,255,255,.75);margin-left:auto;white-space:nowrap;user-select:none;flex-shrink:0}
.connector{width:2px;background:#e5e7eb;height:5px;margin:0 auto;margin-bottom:5px}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

.msg-block{padding:14px 16px;border-radius:8px;border-left:4px solid;background:#fafafa}

footer{text-align:center;padding:24px;font-size:12px;color:#bbb}

let DATA=JSON.parse(JSON.stringify(INIT))
let active='template'
let openStages={}

function toast(msg){
  const t=document.getElementById('toast')
  t.textContent=msg;t.classList.add('show')
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'})
  const a=document.createElement('a');a.href=URL.createObjectURL(blob)
  a.download='lmg-funnel.json';a.click();toast('Exported!')
}

function saveItem(v,s,f,i,val){DATA[v].stages[s][f][i]=val;toast('Saved')}
function saveDesc(s,val){DATA[active].stages[s].desc=val;toast('Saved')}
function saveHdr(val){DATA[active].header.desc=val;toast('Saved')}
function saveField(sk,field,val){DATA[active].stages[sk][field]=val;toast('Saved')}

function addItem(s,f){
  DATA[active].stages[s][f].push('New item')
  renderFunnel()
  setTimeout(()=>{
    const els=document.querySelectorAll('#list-'+s+'-'+f+' .editable')
    if(els.length)els[els.length-1].focus()
  },40)
}
function delItem(s,f,i){DATA[active].stages[s][f].splice(i,1);renderFunnel();setTextContent()}

function toggleStage(key){
  openStages[key]=!openStages[key]
  const panel=document.getElementById('det-'+key)
  if(panel) panel.classList.toggle('open',!!openStages[key])
  const a=document.getElementById('arr-'+key)
  if(a) a.textContent=openStages[key]?'collapse':'expand'
  if(openStages[key]) setTextContent()
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=
    Object.keys(DATA).map(k=>
      `<button class="tab${k===active?' active':''}" onclick="setView('${k}')">${DATA[k].label}</button>`
    ).join('')+
    `<div class="btn-row"><button class="btn" onclick="exportJSON()">Export JSON</button></div>`
}

function renderHeader(){
  const el=document.getElementById('view-header')
  const h=DATA[active].header
  if(!h){el.style.display='none';return}
  el.style.display='block'
  const badges=h.badges.map(b=>`<span class="badge ${b.c}">${b.t}</span>`).join('')
  el.innerHTML=`<h2>${h.title}</h2>
    <span id="hdr-desc" contenteditable="true" style="font-size:13px;color:#555;line-height:1.6;outline:none;border-radius:3px;padding:1px 4px;display:inline-block;width:100%">${h.desc}</span>
    <div class="badges">${badges}</div>`
  document.getElementById('hdr-desc').addEventListener('blur',function(){saveHdr(this.innerText.trim())})
}

function renderList(sk,field,items){
  const rows=items.map((it,i)=>`
    <div class="list-item">
      <span class="bullet">•</span>
      <span class="editable" contenteditable="true" id="item-${sk}-${field}-${i}">${it}</span>
      <button class="del-btn" onclick="delItem('${sk}','${field}',${i})">X</button>
    </div>`).join('')
  return `<div id="list-${sk}-${field}">${rows}
    <button class="add-btn" onclick="addItem('${sk}','${field}')">+ add</button>
  </div>`
}

function attachListeners(){
  document.querySelectorAll('.editable[id^="item-"]').forEach(el=>{
    el.addEventListener('blur',function(){
      const parts=this.id.replace('item-','').split('-')
      const field=parts.pop()
      const sk=parts.pop()
      const i=parseInt(parts.pop())
      saveItem(active,sk,field,i,this.innerText.trim())
    })
    el.addEventListener('keydown',function(e){
      if(e.key==='Enter'){e.preventDefault();this.blur()}
    })
  })
  document.querySelectorAll('.bar-desc').forEach(el=>{
    el.addEventListener('blur',function(){saveDesc(this.dataset.key,this.innerText.trim())})
    el.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();this.blur()}})
    el.addEventListener('click',function(e){e.stopPropagation()})
  })
  const fields=['msg','creative_content','creative_tone','creative_formats']
  fields.forEach(field=>{
    STAGES.forEach(s=>{
      const prefix=field==='msg'?'msg':field==='creative_content'?'cc':field==='creative_tone'?'tone':'fmt'
      const el=document.getElementById(prefix+'-'+s.key)
      if(el){
        el.addEventListener('blur',function(){saveField(s.key,field,this.innerText.trim())})
        el.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();this.blur()}})
      }
    })
  })
}

function renderFunnel(){
  const el=document.getElementById('funnel')
  const d=DATA[active]
  el.innerHTML=STAGES.map((s,idx)=>{
    const st=d.stages[s.key]
    const isOpen=!!openStages[s.key]
    return `
    <div class="funnel-stage-row">
      <div class="funnel-bar" style="width:${s.w}%;background:${s.color}" onclick="toggleStage('${s.key}')">
        <div class="bar-inner">
          <span class="bar-label">${s.label}</span>
          <span class="bar-desc" data-key="${s.key}">${st.desc}</span>
          <span class="bar-toggle" id="arr-${s.key}">${isOpen?'collapse':'expand'}</span>
        </div>
      </div>
    </div>
    ${idx<STAGES.length-1?'<div class="connector"></div>':''}
    <div class="detail${isOpen?' open':''}" id="det-${s.key}">
      <div class="detail-grid">
        <div class="detail-col"><h4>Tactics</h4>${renderList(s.key,'tactics',st.tactics)}</div>
        <div class="detail-col"><h4>Targeting</h4>${renderList(s.key,'targeting',st.targeting)}</div>
      </div>
      <div class="content-blocks">
        <div class="msg-block" style="border-color:${s.color}">
          <h4 style="color:${s.color}">Messaging angle</h4>
          <span class="field-text" id="msg-${s.key}" contenteditable="true"></span>
        </div>
        <div class="creative-block">
          <h4>Content / Creative Angle</h4>
          <div class="creative-grid">
            <div class="creative-sub">
              <h5>What content to use</h5>
              <span class="field-text" id="cc-${s.key}" contenteditable="true"></span>
            </div>
            <div class="creative-sub">
              <h5>Visual / tone direction</h5>
              <span class="field-text" id="tone-${s.key}" contenteditable="true"></span>
            </div>
            <div class="creative-sub">
              <h5>Formats</h5>
              <span class="field-text" id="fmt-${s.key}" contenteditable="true"></span>
            </div>
          </div>
        </div>
      </div>
    </div>`
  }).join('')
  attachListeners()
  setTextContent()
}

function setTextContent(){
  const d=DATA[active]
  STAGES.forEach(s=>{
    const st=d.stages[s.key]
    ;[['msg-'+s.key,'msg'],['cc-'+s.key,'creative_content'],['tone-'+s.key,'creative_tone'],['fmt-'+s.key,'creative_formats']].forEach(([id,field])=>{
      const el=document.getElementById(id)
      if(el&&document.activeElement!==el) el.textContent=st[field]||''
    })
  })
}

function setView(v){active=v;openStages={};renderTabs();renderHeader();renderFunnel()}
renderTabs();renderHeader();renderFunnel()
</script>
</body>
</html>
